name: Build APK

on:
  workflow_dispatch:
    inputs:
      build_type:
        description: 'Тип сборки'
        required: true
        default: 'debug'
        type: choice
        options:
          - debug
          - release

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          submodules: recursive

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'
          cache: gradle

      - name: Setup Android SDK
        uses: android-actions/setup-android@v3

      - name: Install NDK 29.0.13846066
        run: |
          echo "y" | $ANDROID_SDK_ROOT/cmdline-tools/latest/bin/sdkmanager \
            "ndk;29.0.13846066"

      - name: Grant execute permission for gradlew
        run: chmod +x gradlew

      - name: Cache Gradle packages
        uses: actions/cache@v4
        with:
          path: |
            ~/.gradle/caches
            ~/.gradle/wrapper
          key: ${{ runner.os }}-gradle-${{ hashFiles('**/*.gradle*', '**/gradle-wrapper.properties') }}
          restore-keys: |
            ${{ runner.os }}-gradle-

      - name: Build Debug APK
        if: ${{ github.event.inputs.build_type == 'debug' }}
        run: ./gradlew assembleDebug --stacktrace

      - name: Generate temporary keystore for Release
        if: ${{ github.event.inputs.build_type == 'release' }}
        run: |
          keytool -genkeypair \
            -keystore release.keystore \
            -alias testkey \
            -keyalg RSA \
            -keysize 2048 \
            -validity 10000 \
            -storepass testpass \
            -keypass testpass \
            -dname "CN=Test, OU=Test, O=Test, L=Test, S=Test, C=US"

      - name: Build Release APK
        if: ${{ github.event.inputs.build_type == 'release' }}
        env:
          KEYSTORE_PATH: ${{ github.workspace }}/release.keystore
          KEYSTORE_PASSWORD: testpass
          KEY_ALIAS: testkey
          KEY_PASSWORD: testpass
        run: |
          ./gradlew assembleRelease \
            -Pandroid.injected.signing.store.file=$KEYSTORE_PATH \
            -Pandroid.injected.signing.store.password=$KEYSTORE_PASSWORD \
            -Pandroid.injected.signing.key.alias=$KEY_ALIAS \
            -Pandroid.injected.signing.key.password=$KEY_PASSWORD \
            --stacktrace

      - name: Find APK files
        id: find_apk
        run: |
          APK_PATH=$(find . -name "*.apk" -not -path "*/test*" | head -1)
          echo "apk_path=$APK_PATH" >> $GITHUB_OUTPUT
          echo "Found APK: $APK_PATH"
          find . -name "*.apk" -not -path "*/test*"

      - name: Upload APK as artifact
        uses: actions/upload-artifact@v4
        with:
          name: NewBlackbox-${{ github.event.inputs.build_type }}-${{ github.run_number }}
          path: |
            **/*.apk
            !**/test/**
          retention-days: 30
          if-no-files-found: error
